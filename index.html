<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Donate | ShadowGrid</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: #020617;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  transition: .3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 25px rgba(59,130,246,.4);
}

.price {
  color: #3b82f6;
  font-size: 20px;
  margin-bottom: 15px;
}

button {
  background: #3b82f6;
  border: none;
  padding: 12px;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
button:hover { background: #2563eb; }
</style>
</head>

<body>
<div class="container">
<h1>💎 Донат магазин</h1>

<div class="cards">
  <div class="card"><h2>Shadow Lord</h2><div class="price">200 грн</div>
    <button onclick="goPay('Shadow Lord',200)">Купить</button></div>

  <div class="card"><h2>Magister</h2><div class="price">150 грн</div>
    <button onclick="goPay('Magister',150)">Купить</button></div>

  <div class="card"><h2>Oracle</h2><div class="price">85 грн</div>
    <button onclick="goPay('Oracle',85)">Купить</button></div>

  <div class="card"><h2>Executor</h2><div class="price">50 грн</div>
    <button onclick="goPay('Executor',50)">Купить</button></div>

  <div class="card"><h2>Whisper</h2><div class="price">25 грн</div>
    <button onclick="goPay('Whisper',25)">Купить</button></div>

  <div class="card"><h2>Smith</h2><div class="price">10 грн</div>
    <button onclick="goPay('Smith',10)">Купить</button></div>
</div>
</div>

<script>
function goPay(name, price) {
  window.location.href =
    `pay.html?item=${encodeURIComponent(name)}&price=${price}`;
}
</script>
</body>
</html>
