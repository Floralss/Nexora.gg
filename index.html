<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Case Battle</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #ff4500; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #ff5722; }
        .hidden { display: none; }
        .profile-stat { background: #2a2a2a; padding: 10px; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 CS2 Case Battle</h1>
    <div id="status">Загрузка...</div>

    <!-- Блок для неавторизованных -->
    <div id="auth-box" class="hidden">
        <h3>Вход / Регистрация</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button id="btn-login">Войти</button>
        <button id="btn-register">Зарегистрироваться</button>
        <p id="auth-error" style="color: red;"></p>
    </div>

    <!-- Блок профиля -->
    <div id="profile-box" class="hidden">
        <h3>Профиль Игрока</h3>
        <p>Email: <span id="user-email"></span></p>
        <div class="profile-stat">
            <strong>Баланс:</strong> <span id="user-balance">0</span> $
        </div>
        <div class="profile-stat">
            <strong>Инвентарь:</strong> <span id="user-inventory">Пусто</span>
        </div>
        <button id="btn-logout">Выйти</button>
    </div>
</div>

<!-- Подключаем Firebase как ES модули -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // Твои данные конфигурации
    const firebaseConfig = {
        apiKey: "AIzaSyDmf-lcDM5hXBwBqzymGlzdoHdTGfT2pRg",
        authDomain: "magniybank.firebaseapp.com",
        databaseURL: "https://magniybank-default-rtdb.firebaseio.com",
        projectId: "magniybank",
        storageBucket: "magniybank.firebasestorage.app",
        messagingSenderId: "1006815080708",
        appId: "1:1006815080708:web:e9c3afd0a15d8abbe46051",
        measurementId: "G-1W0FP9YX6G"
    };

    // Инициализация
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // UI Элементы
    const authBox = document.getElementById('auth-box');
    const profileBox = document.getElementById('profile-box');
    const statusTxt = document.getElementById('status');
    const authError = document.getElementById('auth-error');

    // Логика UI
    function updateUI(user) {
        statusTxt.classList.add('hidden');
        if (user) {
            authBox.classList.add('hidden');
            profileBox.classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;
            
            // Подписываемся на обновления данных профиля из базы
            const userRef = ref(db, 'users/' + user.uid);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('user-balance').innerText = data.balance;
                    document.getElementById('user-inventory').innerText = data.inventory ? Object.keys(data.inventory).length + ' предметов' : 'Пусто';
                }
            });
        } else {
            authBox.classList.remove('hidden');
            profileBox.classList.add('hidden');
        }
    }

    // Слушатель состояния авторизации
    onAuthStateChanged(auth, (user) => updateUI(user));

    // Регистрация
    document.getElementById('btn-register').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;
            // При регистрации создаем запись в БД: стартовый баланс 100$
            await set(ref(db, 'users/' + user.uid), {
                email: user.email,
                balance: 100,
                inventory: {},
                registeredAt: new Date().toISOString()
            });
            authError.innerText = '';
        } catch (error) {
            authError.innerText = "Ошибка: " + error.message;
        }
    });

    // Логин
    document.getElementById('btn-login').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            authError.innerText = '';
        } catch (error) {
            authError.innerText = "Ошибка: " + error.message;
        }
    });

    // Выход
    document.getElementById('btn-logout').addEventListener('click', () => {
        signOut(auth);
    });
</script>

</body>
</html>
