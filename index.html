<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeGrid Space</title>
    <style>
        :root {
            --bg-servers: #1e1f22;
            --bg-channels: #2b2d31;
            --bg-chat: #313338;
            --bg-profile: #232428;
            --bg-input: #383a40;
            --accent-purple: #5865f2;
            --accent-cyan: #00f2fe;
            --text-main: #f2f3f5;
            --text-muted: #949ba4;
            --online: #23a55a;
            --idle: #f0b232;
            --dnd: #f23f43;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-chat);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. Панель Серверов (Discord style) */
        .servers-sidebar {
            width: 72px;
            background-color: var(--bg-servers);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            gap: 8px;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--bg-channels);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            color: var(--text-main);
            position: relative;
        }

        .server-icon:hover, .server-icon.active {
            border-radius: 16px;
            background-color: var(--accent-purple);
            color: white;
        }

        .server-icon::before {
            content: '';
            position: absolute;
            left: -12px;
            width: 8px;
            height: 0;
            background-color: white;
            border-radius: 0 4px 4px 0;
            transition: all 0.2s;
        }

        .server-icon.active::before {
            height: 40px;
        }

        /* 2. Панель Каналов / Диалогов */
        .channels-sidebar {
            width: 240px;
            background-color: var(--bg-channels);
            display: flex;
            flex-direction: column;
        }

        .header-box {
            height: 48px;
            border-bottom: 1px solid rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .channel-list {
            padding: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .channel-btn {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .channel-btn:hover, .channel-btn.active {
            background-color: rgba(255,255,255,0.06);
            color: var(--text-main);
        }

        .channel-btn::before {
            content: '#';
            color: var(--text-muted);
            font-size: 18px;
        }

        /* 3. Основная Зона Чата (Telegram style fluidness) */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 16px;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-purple);
            background-size: cover;
            background-position: center;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .msg-author {
            font-weight: 600;
            font-size: 15px;
        }

        .msg-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .msg-text {
            font-size: 15px;
            color: #dbdee1;
            line-height: 1.4;
            user-select: text;
        }

        .chat-input-area {
            padding: 0 20px 24px 20px;
        }

        .input-wrapper {
            background-color: var(--bg-input);
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }

        .input-wrapper button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.1s;
        }
        .input-wrapper button:hover { transform: scale(1.1); }

        /* 4. Правая Панель: Профиль & Друзья */
        .right-sidebar {
            width: 300px;
            background-color: var(--bg-profile);
            border-left: 1px solid rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .discord-profile {
            background: #111214;
            margin: 16px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .p-banner {
            height: 60px;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-cyan));
        }

        .p-body {
            padding: 48px 16px 16px 16px;
            position: relative;
        }

        .p-avatar-container {
            position: absolute;
            top: -35px;
            left: 12px;
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 6px solid #111214;
            background: #2b2d31;
            cursor: pointer;
        }

        .p-avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid #111214;
            background-color: var(--online);
        }

        .p-name { font-size: 18px; font-weight: bold; }
        .p-tag { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
        .p-bio { font-size: 13px; background: #1e1f22; padding: 8px; border-radius: 4px; margin-bottom: 12px; }

        /* Форма настроек */
        .settings-box {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-box input, .settings-box select {
            background: #1e1f22;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 4px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .btn {
            background: var(--accent-purple);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }

        /* Друзья */
        .friends-section {
            margin-top: 20px;
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .friends-list {
            margin-top: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .friend-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1f22;
            padding: 8px;
            border-radius: 6px;
        }

        .f-info { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .f-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-cyan); }
        .f-remove { background: none; border: none; color: var(--dnd); cursor: pointer; font-size: 12px;}
    </style>
</head>
<body>

    <div class="servers-sidebar">
        <div class="server-icon active" title="Главный хаб">VG</div>
        <div class="server-icon" title="Игры">🎮</div>
        <div class="server-icon" title="Музыка">🎵</div>
    </div>

    <div class="channels-sidebar">
        <div class="header-box">VibeGrid Space</div>
        <div class="channel-list">
            <div class="channel-btn active" onclick="switchChannel('general')">основной-чат</div>
            <div class="channel-btn" onclick="switchChannel('memes')">мемы-и-флуд</div>
            <div class="channel-btn" onclick="switchChannel('dev')">разработка</div>
        </div>
    </div>

    <div class="chat-area">
        <div class="header-box" id="chat-header"># основной-чат</div>
        
        <div class="chat-messages" id="chat-box">
            </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Написать в чат..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">🚀</button>
            </div>
        </div>
    </div>

    <div class="right-sidebar">
        <div class="discord-profile">
            <div class="p-banner"></div>
            <div class="p-body">
                <div class="p-avatar-container" onclick="document.getElementById('file-input').click()">
                    <img id="my-avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=Lucky" alt="avatar">
                    <div class="status-dot" id="status-indicator"></div>
                </div>
                <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="changeAvatar(event)">
                
                <div class="p-name" id="my-name">GamerX</div>
                <div class="p-tag" id="my-tag">@gamerx</div>
                <div class="p-bio" id="my-bio">Зависаю на VibeGrid! 🌌</div>
            </div>
        </div>

        <div class="settings-box">
            <input type="text" id="set-name" placeholder="Изменить ник...">
            <input type="text" id="set-bio" placeholder="Изменить статус...">
            <select id="set-status" onchange="changeStatus()">
                <option value="online">🟢 В сети</option>
                <option value="idle">🟡 Нет на месте</option>
                <option value="dnd">🔴 Не беспокоить</option>
            </select>
            <button class="btn" onclick="updateProfile()">Обновить профиль</button>
        </div>

        <div class="friends-section">
            <h4 style="font-size: 13px; color: var(--text-muted); text-transform: uppercase;">Друзья</h4>
            <div style="display: flex; gap: 4px; margin-top: 8px;">
                <input type="text" id="friend-input" placeholder="Ник друга..." style="flex:1; background:#1e1f22; border:none; padding:6px; color:white; border-radius:4px; font-size:13px;">
                <button class="btn" style="padding:0 8px;" onclick="addFriend()">+</button>
            </div>
            <div class="friends-list" id="friends-box">
                </div>
        </div>
    </div>

    <script>
        // База данных приложения (подгружается из localStorage или ставит дефолт)
        let state = {
            user: JSON.parse(localStorage.getItem('vg_user')) || {
                name: "GamerX",
                bio: "Зависаю на VibeGrid! 🌌",
                status: "online",
                avatar: "https://api.dicebear.com/7.x/identicon/svg?seed=Lucky"
            },
            friends: JSON.parse(localStorage.getItem('vg_friends')) || ["CyberPanda", "NeonVibe"],
            currentChannel: "general",
            // Хранилище сообщений по каналам
            messages: JSON.parse(localStorage.getItem('vg_chat_history')) || {
                general: [
                    { sender: "System", text: "Добро пожаловать на сервер VibeGrid! 👋", time: "Система" },
                    { sender: "CyberPanda", text: "Ого, этот чат работает невероятно быстро!", time: "12:40" }
                ],
                memes: [
                    { sender: "NeonVibe", text: "Скидывайте сюда самые имбовые мемы", time: "Вчера" }
                ],
                dev: [
                    { sender: "System", text: "Канал для обсуждения кода и обновлений.", time: "Система" }
                ]
            }
        };

        // Запуск приложения
        document.addEventListener("DOMContentLoaded", () => {
            loadProfile();
            renderFriends();
            renderMessages();
        });

        // Функция рендеринга сообщений
        function renderMessages() {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            
            const currentMsgs = state.messages[state.currentChannel] || [];
            
            currentMsgs.forEach(msg => {
                const isMe = msg.sender === state.user.name;
                const avatarUrl = isMe ? state.user.avatar : `https://api.dicebear.com/7.x/bottts/svg?seed=${msg.sender}`;
                
                const msgHtml = `
                    <div class="message">
                        <div class="msg-avatar" style="background-image: url('${avatarUrl}')"></div>
                        <div class="msg-content">
                            <div class="msg-header">
                                <span class="msg-author" style="color: ${msg.sender === 'System' ? 'var(--accent-cyan)' : 'var(--text-main)'}">${msg.sender}</span>
                                <span class="msg-time">${msg.time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                        </div>
                    </div>
                `;
                chatBox.insertAdjacentHTML('beforeend', msgHtml);
            });
            chatBox.scrollTop = chatBox.scrollHeight; // Скролл вниз
        }

        // Отправка сообщений
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text === '') return;

            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Добавляем сообщение пользователя
            state.messages[state.currentChannel].push({
                sender: state.user.name,
                text: text,
                time: timeStr
            });

            input.value = '';
            renderMessages();
            saveToStorage();

            // РАБОЧАЯ ФУНКЦИЯ: Ответ ИИ Бот-Собеседника (VibeBot)
            setTimeout(() => {
                botReply(text);
            }, 1000);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // Логика умных ответов бота
        function botReply(userText) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let replyText = "Имбово сказано! 🔥 Напиши что-нибудь еще.";

            const lowText = userText.toLowerCase();
            if (lowText.includes("привет") || lowText.includes("салам")) {
                replyText = `Йоу! Рад тебя видеть в #${state.currentChannel}. Как сам?`;
            } else if (lowText.includes("как дела") || lowText.includes("что делаешь")) {
                replyText = "Да вот, тестирую наш новый ультра-быстрый движок общения. Всё летает! 🚀";
            } else if (lowText.includes("код") || lowText.includes("сайт")) {
                replyText = "Код полностью оптимизирован. Чистый JS, адаптивная верстка и работа с LocalStorage!";
            } else if (lowText.includes("дискорд") || lowText.includes("тг")) {
                replyText = "Мы взяли лучшее: структуру каналов от Дискорда и плавные, легкие чаты от Телеграма!";
            }

            state.messages[state.currentChannel].push({
                sender: "VibeBot 🤖",
                text: replyText,
                time: timeStr
            });

            renderMessages();
            saveToStorage();
        }

        // Переключение каналов
        function switchChannel(channelId) {
            state.currentChannel = channelId;
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('chat-header').textContent = `# ${event.currentTarget.textContent}`;
            renderMessages();
        }

        // Обновление профиля (Смена ника и био)
        function updateProfile() {
            const nameInput = document.getElementById('set-name').value.trim();
            const bioInput = document.getElementById('set-bio').value.trim();

            if (nameInput !== "") {
                state.user.name = nameInput;
                state.user.tag = '@' + nameInput.toLowerCase().replace(/\s+/g, '');
            }
            if (bioInput !== "") {
                state.user.bio = bioInput;
            }

            document.getElementById('set-name').value = '';
            document.getElementById('set-bio').value = '';

            loadProfile();
            saveToStorage();
            renderMessages(); // Перерендерить чат, чтобы обновились аватарки у твоих сообщений
        }

        // Загрузка данных профиля в интерфейс
        function loadProfile() {
            document.getElementById('my-name').textContent = state.user.name;
            document.getElementById('my-tag').textContent = '@' + state.user.name.toLowerCase().replace(/\s+/g, '');
            document.getElementById('my-bio').textContent = state.user.bio;
            document.getElementById('my-avatar').src = state.user.avatar;
            
            // Статус цветной
            const indicator = document.getElementById('status-indicator');
            if (state.user.status === 'online') indicator.style.backgroundColor = 'var(--online)';
            if (state.user.status === 'idle') indicator.style.backgroundColor = 'var(--idle)';
            if (state.user.status === 'dnd') indicator.style.backgroundColor = 'var(--dnd)';
        }

        // Смена статуса в селекте
        function changeStatus() {
            state.user.status = document.getElementById('set-status').value;
            loadProfile();
            saveToStorage();
        }

        // Загрузка кастомной аватарки с диска
        function changeAvatar(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    state.user.avatar = event.target.result;
                    loadProfile();
                    saveToStorage();
                    renderMessages();
                }
                reader.readAsDataURL(file);
            }
        }

        // Управление друзьями
        function renderFriends() {
            const box = document.getElementById('friends-box');
            box.innerHTML = '';
            state.friends.forEach((name, idx) => {
                box.insertAdjacentHTML('beforeend', `
                    <div class="friend-card">
                        <div class="f-info">
                            <div class="f-avatar" style="background-image: url('https://api.dicebear.com/7.x/pixel-art/svg?seed=${name}')"></div>
                            <span>${name}</span>
                        </div>
                        <button class="f-remove" onclick="removeFriend(${idx})">✖</button>
                    </div>
                `);
            });
        }

        function addFriend() {
            const input = document.getElementById('friend-input');
            const name = input.value.trim();
            if (name === '' || state.friends.includes(name)) return;
            
            state.friends.push(name);
            input.value = '';
            renderFriends();
            saveToStorage();
        }

        function removeFriend(idx) {
            state.friends.splice(idx, 1);
            renderFriends();
            saveToStorage();
        }

        // Сохранение всей сессии в локальную память браузера
        function saveToStorage() {
            localStorage.setItem('vg_user', JSON.stringify(state.user));
            localStorage.setItem('vg_friends', JSON.stringify(state.friends));
            localStorage.setItem('vg_chat_history', JSON.stringify(state.messages));
        }
    </script>
</body>
</html>
