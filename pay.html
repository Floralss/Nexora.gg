<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оплата | ShadowGrid</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
}

.box {
  max-width: 420px;
  margin: 80px auto;
  background: #020617;
  padding: 25px;
  border-radius: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
button:hover { background: #2563eb; }

.warn {
  color: #facc15;
  font-size: 14px;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="box">
<h2 id="item"></h2>
<p id="price"></p>

<input id="nick" placeholder="Ник в Minecraft">

<div class="warn">
⚠️ Если ник введён неправильно — донат может не прийти.
</div>

<button onclick="pay()">Перейти к оплате</button>

<hr style="margin:20px 0">

<p>💳 Оплата через <b>Monobank</b></p>
<p>Реквизиты добавим позже</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const item = params.get("item");
const price = params.get("price");

document.getElementById("item").innerText = "Привилегия: " + item;
document.getElementById("price").innerText = "Сумма: " + price + " грн";

function pay() {
  const nick = document.getElementById("nick").value;
  if (!nick) {
    alert("Введите ник!");
    return;
  }
  alert("Далее будет реальная оплата и автовыдача");
}
</script>
</body>
</html>
